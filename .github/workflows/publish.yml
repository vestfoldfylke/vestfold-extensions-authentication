name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-nuget-package:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'release' && github.event.release.target_commitish == 'main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC (trusted publisher setup)
      contents: read

    steps:
      - name: Publish NuGet package
        uses: vestfoldfylke/shared/.github/actions/nuget-publish@main
        with:
          nuget_user: ${{ secrets.NUGET_USER }}
          dotnet_version: "8.0.x"
          project_release_path: "Vestfold.Extensions.Authentication/bin/Release"
