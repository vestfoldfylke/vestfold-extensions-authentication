name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  nuget-login:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'release' && github.event.release.target_commitish == 'main')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
      contents: read
    outputs: 
      nuget_api_key: ${{ steps.login.outputs.NUGET_API_KEY }}
    steps:
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
          user: ${{ secrets.NUGET_USER }} # Recommended: use a secret like ${{ secrets.NUGET_USER }} for your nuget.org username (profile name), NOT your email address

  publish-nuget-package:
    needs: nuget-login
    uses: vestfoldfylke/shared/.github/workflows/publish-nuget-package.yml@main
    permissions:
      contents: read
    with:
      dotnet_version: "8.0.x" # this one is optional and defaults to "8.0.x" if not set. Can be any version supported by actions/setup-dotnet, e.g. "8.0.x", "9.0.x", "10.0.x"
      project_path: "Vestfold.Extensions.Authentication/Vestfold.Extensions.Authentication.csproj" # this one is required and should be the path to the .csproj file relative to the root of the repository
      project_release_path: "Vestfold.Extensions.Authentication/bin/Release" # this one is required and should be the path to the directory containing the .nupkg file(s) relative to the root of the repository
    secrets:
      NUGET_API_KEY: ${{ needs.nuget-login.outputs.nuget_api_key }} # required. Pass the short-lived NuGet API key obtained in the nuget-login job to the publish-nuget-package workflow as a secret. The publish-nuget-package workflow will use this API key to authenticate with NuGet.org when publishing the package. The API key is short-lived (1 hour) and will be automatically revoked after that
